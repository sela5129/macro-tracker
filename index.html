<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: #FAFAF6; color: #111; font-family: -apple-system, system-ui, sans-serif; }
  body { padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; }
  input, select, button { font-family: inherit; }
  input:focus, select:focus { outline: none; border-color: #111 !important; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 16px 12px 40px; }
  .hdr { background:#111; color:#FAFAF6; padding:12px 16px; display:flex; align-items:center; justify-content:space-between; }
  .hdr .title { font-size:22px; font-weight:900; text-transform:uppercase; letter-spacing:-0.5px; }
  .banner { background:#F4D9D2; border:4px solid #111; border-top:0; padding:8px 12px; font-size:12px; }
  .toggle2 { display:grid; grid-template-columns:1fr 1fr; border:4px solid #111; border-top:4px solid #111; border-bottom:0; }
  .toggle2 button, .toggle3 button, .toggle4 button { padding:10px 0; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; background:#fff; color:#111; border:0; cursor:pointer; }
  .toggle2 button.active, .toggle3 button.active, .toggle4 button.active { background:#111; color:#fff; }
  .toggle2 button:nth-child(2) { border-left:2px solid #111; }
  .datenav { background:#fff; border:4px solid #111; border-top:0; border-bottom:0; display:flex; align-items:center; justify-content:space-between; padding:8px; }
  .datenav button { background:none; border:0; font-size:20px; padding:8px 14px; cursor:pointer; color:#111; }
  .datenav button:disabled { opacity:0.25; }
  .datenav .lbl { font-weight:700; font-size:15px; text-transform:uppercase; letter-spacing:0.02em; }
  .panel { background:#fff; border:4px solid #111; border-top:0; padding:12px 16px 16px; }
  .panel-hdr { display:flex; align-items:baseline; justify-content:space-between; border-bottom:8px solid #111; padding-bottom:4px; }
  .panel-hdr .ttl { font-size:26px; font-weight:900; text-transform:uppercase; line-height:1.1; }
  .panel-hdr .goals-btn { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; color:rgba(0,0,0,0.5); text-decoration:underline; background:none; border:0; cursor:pointer; }
  .goals-edit { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:8px 0; border-bottom:1px solid rgba(0,0,0,0.15); }
  .goals-edit label { font-size:11px; font-family:'SF Mono', Menlo, monospace; color:rgba(0,0,0,0.6); }
  .goals-edit input { width:100%; border:2px solid rgba(0,0,0,0.2); padding:4px 8px; margin-top:2px; font-size:14px; }
  .cal-row { display:flex; align-items:baseline; justify-content:space-between; border-bottom:4px solid #111; padding:8px 0; }
  .cal-row .lbl { font-size:17px; font-weight:800; text-transform:uppercase; }
  .cal-row .val { font-size:34px; font-weight:900; font-family:'SF Mono', Menlo, monospace; }
  .cal-row .val .goal { font-size:13px; color:rgba(0,0,0,0.4); }
  .macro-row { display:flex; align-items:baseline; justify-content:space-between; border-top:1px solid rgba(0,0,0,0.15); padding:8px 0; }
  .macro-row .lbl { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; }
  .macro-row .val { font-size:15px; font-family:'SF Mono', Menlo, monospace; }
  .pbar-wrap { margin-top:-6px; padding-bottom:6px; }
  .pbar-bg { height:6px; background:rgba(0,0,0,0.1); border-radius:3px; overflow:hidden; }
  .pbar-fill { height:100%; border-radius:3px; }
  .pbar-note { font-size:10px; font-family:'SF Mono', Menlo, monospace; color:rgba(0,0,0,0.4); margin-top:2px; }
  .burned-box { margin-top:12px; display:flex; align-items:center; justify-content:space-between; background:#F1EFE6; padding:8px 12px; border-radius:6px; }
  .burned-box .lbl { font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.02em; color:rgba(0,0,0,0.7); }
  .stepper { display:flex; align-items:center; gap:8px; }
  .stepper button { width:28px; height:28px; display:flex; align-items:center; justify-content:center; background:#111; color:#fff; border:0; border-radius:6px; font-size:16px; cursor:pointer; }
  .stepper input { width:56px; text-align:center; font-family:'SF Mono',Menlo,monospace; font-size:15px; background:#fff; border:1px solid rgba(0,0,0,0.2); border-radius:4px; padding:4px; }
  .copy-btn { margin-top:12px; width:100%; background:#F1EFE6; border:1px solid rgba(0,0,0,0.2); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; padding:10px; cursor:pointer; }
  .toggle3 { margin-top:16px; display:grid; grid-template-columns:1fr 1fr 1fr; border:2px solid #111; }
  .toggle3 button { display:flex; align-items:center; justify-content:center; gap:5px; font-size:12px; }
  .toggle3 button:not(:first-child) { border-left:2px solid #111; }
  .toggle4 { margin-top:16px; display:grid; grid-template-columns:1fr 1fr 1fr 1fr; border:2px solid #111; }
  .toggle4 button { display:flex; align-items:center; justify-content:center; gap:4px; font-size:11px; padding:10px 2px; }
  .toggle4 button:not(:first-child) { border-left:2px solid #111; }
  #scanner-overlay { position:fixed; inset:0; background:#000; z-index:100; display:flex; align-items:center; justify-content:center; }
  .scanner-box { position:relative; width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #scanner-video { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
  .scanner-frame { position:relative; width:80%; max-width:320px; height:140px; border:3px solid #fff; border-radius:12px; box-shadow:0 0 0 2000px rgba(0,0,0,0.45); }
  .scanner-status { position:relative; margin-top:24px; color:#fff; font-size:14px; text-align:center; padding:0 24px; z-index:1; }
  #scanner-cancel { position:absolute; bottom:40px; z-index:1; background:#fff; color:#111; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; font-size:13px; padding:10px 24px; border:0; border-radius:24px; cursor:pointer; }
  .lookup-spinner { display:inline-block; }
  /* recently logged now shown inline in search dropdown */
  .recent-wrap { margin-top:12px; }
  .recent-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:rgba(0,0,0,0.4); margin-bottom:6px; padding:0 2px; }
  .recent-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .recent-row::-webkit-scrollbar { display:none; }

  .recent-chip .n { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .recent-chip .m { font-size:10px; font-family:'SF Mono',Menlo,monospace; color:rgba(0,0,0,0.5); white-space:nowrap; margin-top:2px; }
  .search-box { margin-top:8px; position:relative; }
  .search-box .row { display:flex; align-items:center; background:#fff; border:2px solid #111; padding:8px 12px; gap:8px; }
  .search-box input { width:100%; border:0; background:none; font-size:15px; }
  .search-box .clear { background:none; border:0; color:rgba(0,0,0,0.4); font-size:18px; cursor:pointer; }
  .results { position:relative; margin-top:4px; background:#fff; border:2px solid #111; max-height:360px; overflow-y:auto; }
  .results-section-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:rgba(0,0,0,0.4); padding:8px 12px 4px; background:#F8F7F3; border-top:1px solid rgba(0,0,0,0.08); }
  .result-item, .browse-item { width:100%; text-align:left; padding:10px 12px; border-bottom:1px solid rgba(0,0,0,0.1); background:none; border:0; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:14px; }
  .result-item .cal, .browse-item .cal { font-size:11px; font-family:'SF Mono',Menlo,monospace; color:rgba(0,0,0,0.5); margin-left:8px; flex-shrink:0; }
  .browse-wrap { margin-top:0; background:#fff; border:2px solid #111; border-top:0; max-height:400px; overflow-y:auto; }
  .browse-search-row { margin-top:8px; display:flex; align-items:center; background:#fff; border:2px solid #111; padding:8px 12px; gap:8px; }
  .browse-search-row input { flex:1; border:0; background:none; font-size:15px; outline:none; }
  .browse-search-clear { background:none; border:0; color:rgba(0,0,0,0.4); font-size:18px; cursor:pointer; padding:0 2px; }
  .cat-hdr { width:100%; display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:#F1EFE6; border:0; font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; cursor:pointer; }
  .cat-hdr.custom { background:#EFE8D8; }
  .cat-hdr .right { display:flex; align-items:center; gap:8px; font-size:11px; font-family:'SF Mono',Menlo,monospace; color:rgba(0,0,0,0.4); }
  .cat-hdr .chev { display:inline-block; transition:transform 0.15s; }
  .cat-hdr.open .chev { transform:rotate(180deg); }
  .browse-item { padding-left:20px; border-top:1px solid rgba(0,0,0,0.08); }
  .browse-item-row { display:flex; align-items:stretch; border-top:1px solid rgba(0,0,0,0.08); }
  .browse-item-main { flex:1; min-width:0; text-align:left; padding:10px 8px 10px 20px; background:none; border:0; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-size:14px; }
  .browse-item-main .cal { font-size:11px; font-family:'SF Mono',Menlo,monospace; color:rgba(0,0,0,0.5); margin-left:8px; flex-shrink:0; }
  .row-actions { display:flex; align-items:center; gap:2px; padding-right:8px; flex-shrink:0; }
  .action-btn { background:none; border:0; font-size:15px; padding:8px; color:rgba(0,0,0,0.4); cursor:pointer; }
  .action-btn:active { color:#111; }
  .edit-food-panel { margin:8px; background:#FAFAF6; border:2px solid #111; padding:12px; }
  .edit-food-panel .ttl { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; margin-bottom:8px; }
  .edit-food-panel input, .edit-food-panel select { border:2px solid rgba(0,0,0,0.2); padding:6px 8px; font-size:13px; width:100%; margin-bottom:6px; }
  .edit-food-panel .btn-row { display:flex; gap:8px; margin-top:4px; }
  .edit-food-panel .btn-row button { flex:1; padding:9px; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; border:0; cursor:pointer; }
  .edit-food-panel .save-btn { background:#111; color:#fff; }
  .edit-food-panel .cancel-btn { background:#eee; color:#111; }
  .delete-confirm { margin:0 0 0 0; background:#F4D9D2; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; gap:8px; border-top:1px solid rgba(0,0,0,0.1); }
  .delete-confirm span { font-size:12px; flex:1; }
  .delete-confirm button { font-size:11px; font-weight:700; text-transform:uppercase; padding:6px 10px; border:0; cursor:pointer; }
  .delete-confirm .yes-btn { background:#9C2B1B; color:#fff; }
  .delete-confirm .no-btn { background:#fff; border:1px solid rgba(0,0,0,0.2); }
  .custom-form { margin-top:8px; background:#fff; border:2px solid #111; padding:16px; }
  .custom-form .ttl { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; margin-bottom:4px; }
  .custom-form .sub { font-size:11px; color:rgba(0,0,0,0.5); margin-bottom:12px; }
  .custom-form input[type=text], .custom-form input[type=number] { border:2px solid rgba(0,0,0,0.2); padding:8px 10px; font-size:14px; width:100%; margin-bottom:8px; }
  .custom-form .amt-row { display:flex; gap:8px; margin-bottom:12px; }
  .custom-form .amt-row input { width:96px; margin-bottom:0; }
  .custom-form select { border:2px solid rgba(0,0,0,0.2); padding:8px 10px; font-size:14px; background:#fff; }
  .custom-form .sublabel { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; color:rgba(0,0,0,0.5); margin-bottom:4px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
  .grid2 label { font-size:11px; font-family:'SF Mono',Menlo,monospace; color:rgba(0,0,0,0.6); }
  .grid2 input { margin-top:2px; margin-bottom:0; }
  .checkbox-row { display:flex; align-items:center; gap:8px; margin-bottom:12px; font-size:12px; color:rgba(0,0,0,0.7); }
  .big-btn { width:100%; background:#111; color:#fff; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; padding:11px; border:0; font-size:14px; cursor:pointer; }
  .big-btn:disabled { opacity:0.3; }
  .qty-card { margin-top:12px; background:#fff; border:2px solid #111; padding:16px; }
  .qty-card .hdr2 { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .qty-card .hdr2 .name { font-weight:700; font-size:15px; }
  .qty-card .hdr2 button { background:none; border:0; font-size:20px; color:rgba(0,0,0,0.4); cursor:pointer; }
  .qty-stepper { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px; }
  .qty-stepper button { width:40px; height:40px; border-radius:50%; background:#111; color:#fff; border:0; font-size:18px; cursor:pointer; }
  .qty-stepper input { width:96px; text-align:center; font-size:22px; font-weight:700; font-family:'SF Mono',Menlo,monospace; border:0; border-bottom:2px solid #111; background:none; padding:4px 0; }
  .qty-stepper .unit { font-size:14px; font-weight:600; color:rgba(0,0,0,0.6); width:64px; }
  .quick-stats { display:flex; justify-content:center; gap:20px; font-size:15px; font-family:'SF Mono',Menlo,monospace; font-weight:700; margin-bottom:12px; }
  .preview-box { background:#F1EFE6; border:1px solid rgba(0,0,0,0.15); padding:10px 12px; margin-bottom:12px; }
  .preview-box .ttl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; color:rgba(0,0,0,0.5); margin-bottom:6px; }

  .preview-box .row .l { font-size:12px; font-weight:600; text-transform:uppercase; }
  .preview-box .row .v { font-size:16px; font-weight:700; font-family:'SF Mono',Menlo,monospace; }

  .preview-box .note { font-size:11px; font-family:'SF Mono',Menlo,monospace; margin-top:4px; }
  .preview-box .sub-row { display:flex; justify-content:space-between; font-size:11px; font-family:'SF Mono',Menlo,monospace; color:rgba(0,0,0,0.5); margin-top:6px; }
  .entries-hdr { display:flex; align-items:center; justify-content:space-between; margin:20px 4px 8px; }
  .entries-hdr .lbl { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; color:rgba(0,0,0,0.6); }

  .clear-day-btn { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.02em; color:#9C2B1B; background:none; border:0; text-decoration:underline; cursor:pointer; }

  .copy-day-panel .cancel-btn { background:#eee; color:#111; }

function pad(n) { return String(n).padStart(2, '0'); }
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
}
function shiftDate(s, delta) {
  var parts = s.split('-').map(Number);
  var dt = new Date(parts[0], parts[1] - 1, parts[2]);
  dt.setDate(dt.getDate() + delta);
  return dt.getFullYear() + '-' + pad(dt.getMonth() + 1) + '-' + pad(dt.getDate());
}
function prettyDate(s) {
  var parts = s.split('-').map(Number);
  var dt = new Date(parts[0], parts[1] - 1, parts[2]);
  var today = todayStr();
  if (s === today) return 'Today';
  var yest = new Date(); yest.setDate(yest.getDate() - 1);
  var yestStr = yest.getFullYear() + '-' + pad(yest.getMonth() + 1) + '-' + pad(yest.getDate());
  if (s === yestStr) return 'Yesterday';
  return dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function round1(n) { return Math.round((n || 0) * 10) / 10; }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ---------------------------------------------------------------------------
// localStorage helpers (synchronous, real browser storage — this is the whole
// point of running it as a standalone Safari/home-screen app instead of inside
// a Claude artifact)
// ---------------------------------------------------------------------------
function lsGet(key, fallback) {
  try {
    var raw = localStorage.getItem(key);
    return raw == null ? fallback : JSON.parse(raw);
  } catch (e) { return fallback; }
}
function lsSet(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); return true; }
  catch (e) { return false; }
}

function getFoodById(id) {
  if (state.deletedFoodIds.some(function(d){ return String(d) === String(id); })) return null;
  var base = FOODS.find(function(f){ return String(f.id) === String(id); });
  if (!base) return null;
  var o = state.foodEdits[String(id)];
  return o ? Object.assign({}, base, o) : base;
}

// effective base-food list: deletions hidden, edits applied — without touching the original FOODS array
function effectiveBaseFoods() {
  return FOODS.filter(function(f) {
    return !state.deletedFoodIds.some(function(d){ return String(d) === String(f.id); });
  }).map(function(f) {
    var o = state.foodEdits[String(f.id)];
    return o ? Object.assign({}, f, o) : f;
  });
}

function allFoods() { return state.customFoods.concat(effectiveBaseFoods()); }

function identityKey(food) { return food.n.toLowerCase() + '::' + food.u; }
function pairKey(keyA, keyB) { return [keyA, keyB].sort().join('||'); }

function recordPair(newEntry, existingEntries) {
  var newKey = identityKey(newEntry);
  existingEntries.forEach(function(e) {
    var otherKey = identityKey(e);
    if (otherKey === newKey) return;
    var k = pairKey(newKey, otherKey);
    state.pairCounts[k] = (state.pairCounts[k] || 0) + 1;
  });
  lsSet('pairCounts', state.pairCounts);
}

// Smart suggestions: rank candidates by pair-count weighted by recency within today's log.
// The most recently logged item gets the highest multiplier, so if you just logged
// baby carrots, zesty Italian (its most common pair) rises to the top.
function smartSuggestions(entries) {
  if (!entries.length) return [];
  var todayKeys = entries.map(identityKey);
  var n = entries.length;
  var scores = {};
  entries.forEach(function(entry, idx) {
    // recency weight: last-logged item = n, first-logged item = 1
    var weight = idx + 1;
    var key = identityKey(entry);
    Object.keys(state.pairCounts).forEach(function(k) {
      var parts = k.split('||');
      var other = null;
      if (parts[0] === key) other = parts[1];
      else if (parts[1] === key) other = parts[0];
      if (other && todayKeys.indexOf(other) === -1) {
        scores[other] = (scores[other] || 0) + state.pairCounts[k] * weight;
      }
    });
  });
  var ranked = Object.keys(scores).sort(function(a, b) { return scores[b] - scores[a]; }).slice(0, 8);
  var foods = allFoods();
  return ranked.map(function(key) {
    return foods.find(function(f) { return identityKey(f) === key; });
  }).filter(Boolean);
}

// Today's unique logged foods as horizontal chips (most recently logged first, up to 6)
function buildTodayChips(entries) {
  if (!entries.length) return '';
  var seen = {};
  var chips = [];
  for (var i = entries.length - 1; i >= 0; i--) {
    var e = entries[i];
    var key = identityKey(e);
    if (!seen[key]) {
      seen[key] = true;
      chips.push(e);
      if (chips.length === 6) break;
    }
  }
  if (!chips.length) return '';
  var html = '<div class="recent-wrap"><div class="recent-lbl">Logged Today</div><div class="recent-row">';
  chips.forEach(function(e) {
    html += '<button class="recent-chip" data-action="pickRecent" data-id="' + esc(e.id) + '">' +
      '<div class="n">' + esc(e.n) + '</div>' +
      '<div class="m">' + e.qty + UNIT_LABEL[e.u] + ' \u00b7 ' + round1(e.c * e.qty) + 'cal</div>' +
      '</button>';
  });
  html += '</div></div>';
  return html;
}

function computeTotals(entries) {
  var t = entries.reduce(function(acc, e) {
    acc.p += e.p * e.qty; acc.c += e.c * e.qty; acc.cb += e.cb * e.qty; acc.f += e.f * e.qty;
    return acc;
  }, { p: 0, c: 0, cb: 0, f: 0 });
  if (state.view === 'log') t.c = Math.max(0, t.c - getBurned() * 0.5);
  return t;
}

// Builds only the dropdown content (results or suggestions) — never rebuilds
// the search input itself, so the keyboard stays attached while typing.
function buildSearchResults() {
  if (!state.searchFocused) return '';
  var entries = getEntries();
  var q = state.query.trim().toLowerCase();
  var html = '';
  if (q) {
    var results = allFoods().filter(function(f){ return f.n.toLowerCase().indexOf(q) !== -1; }).slice(0, 8);
    if (results.length) {
      html += '<div class="results">';
      results.forEach(function(f) {
        html += '<button class="result-item" data-action="pickFood" data-id="' + f.id + '"><span>' + esc(f.n) + '</span><span class="cal">' + round1(f.c) + 'cal/' + f.u + '</span></button>';
      });
      html += '</div>';
    }
  } else {
    // Smart suggestions: recency-weighted pair matches from today's log
    var suggestions = smartSuggestions(entries);
    if (suggestions.length > 0) {
      html += '<div class="results">';
      html += '<div class="results-section-lbl">Suggested for You</div>';
      suggestions.forEach(function(f) {
        html += '<button class="result-item" data-action="pickFood" data-id="' + esc(f.id) + '">' +
          '<span>' + esc(f.n) + '</span>' +
          '<span class="cal">' + round1(f.c) + 'cal/' + f.u + '</span>' +
          '</button>';
      });
      html += '</div>';
    } else if (state.recentFoods.length > 0) {
      // fall back to all-time recents until enough pairing data is built up
      html += '<div class="results">';
      html += '<div class="results-section-lbl">Recently Logged</div>';
      state.recentFoods.forEach(function(r) {
        html += '<button class="result-item" data-action="pickRecent" data-id="' + esc(r.id) + '">' +
          '<span>' + esc(r.n) + '</span>' +
          '<span class="cal">' + r.qty + UNIT_LABEL[r.u] + ' \u00b7 ' + round1(r.c * r.qty) + 'cal</span>' +
          '</button>';
      });
      html += '</div>';
    }
  }
  return html;
}

// Update only the results div — never touches the search input element.
function updateSearchResults() {
  var container = document.getElementById('src-results');
  if (!container) return;
  container.innerHTML = buildSearchResults();
  // also sync the clear button without a full render
  var clearBtn = document.querySelector('[data-action="clearQuery"]');
  if (state.query && !clearBtn) {
    var row = document.querySelector('.search-box .row');
    if (row) {
      var btn = document.createElement('button');
      btn.className = 'clear';
      btn.dataset.action = 'clearQuery';
      btn.textContent = '\u00d7';
      row.appendChild(btn);
    }
  } else if (!state.query && clearBtn) {
    clearBtn.remove();
  }
}

      (state.query ? '<button class="clear" data-action="clearQuery">\u00d7</button>' : '') +

  }

  if (state.editingFood) {
    var ed = state.editDraft;
    html += '<div class="edit-food-panel">';
    html += '<div class="ttl">Edit Food</div>';
    html += '<input id="edit-name" type="text" data-field="editDraft.n" value="' + esc(ed.n) + '" placeholder="Name">';
    html += '<div class="grid2">' +
      '<label>Unit<select id="edit-unit" data-field="editDraft.u">' +
        ['g','oz','ml','serving'].map(function(u){ return '<option value="'+u+'"'+(ed.u===u?' selected':'')+'>'+(u==='g'?'grams':u==='serving'?'serving':u)+'</option>'; }).join('') +
      '</select></label>' +
      '<label>Calories / unit<input id="edit-cal" type="number" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="decimal" data-field="editDraft.c" value="' + esc(ed.c) + '"></label>' +
      '<label>Protein / unit (g)<input id="edit-protein" type="number" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="decimal" data-field="editDraft.p" value="' + esc(ed.p) + '"></label>' +
      '<label>Carbs / unit (g)<input id="edit-carbs" type="number" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="decimal" data-field="editDraft.cb" value="' + esc(ed.cb) + '"></label>' +
      '<label>Fat / unit (g)<input id="edit-fat" type="number" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="decimal" data-field="editDraft.f" value="' + esc(ed.f) + '"></label>' +

    html += '<div class="btn-row"><button class="cancel-btn" data-action="cancelEditFood">Cancel</button><button class="save-btn" data-action="saveEditFood">Save</button></div>';
    html += '</div>';
  }

  if (state.mode === 'browse' && !state.showCustomForm) {
    var bq = state.browseQuery.trim().toLowerCase();
    html += '<div class="browse-search-row">' +
      '<input id="browse-search" type="text" inputmode="search" enterkeyhint="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-field="browseQuery" placeholder="\uD83D\uDD0D Filter foods\u2026" value="' + esc(state.browseQuery) + '">' +

    html += '<div class="browse-wrap">';

    if (bq) {

      }
      CATEGORY_ORDER.forEach(function(cat) {
        var ids = IDS_BY_CATEGORY[cat];

        if (isOpen) {
          list.forEach(function(f) { html += browseRow(f); });
        }
        html += '</div>';
      });
    }
    html += '</div>';
  }

  if (state.picked) {
    var picked = state.picked;
    html += '<div class="qty-card">';
    html += '<div class="hdr2"><span class="name">' + esc(picked.n) + '</span><button data-action="closePicked">\u00d7</button></div>';
    html += '<div class="qty-stepper">';
    html += '<button data-action="adjustQty" data-value="-' + UNIT_STEP[picked.u] + '">\u2212</button>';
    html += '<input id="qty-input" type="text" inputmode="decimal" enterkeyhint="done" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" data-field="qty" value="' + esc(state.qtyRaw) + '">';
    html += '<span class="unit">' + UNIT_LABEL[picked.u] + '</span>';
    html += '<button data-action="adjustQty" data-value="' + UNIT_STEP[picked.u] + '">+</button>';
    html += '</div>';
    html += '<div class="quick-stats">' +
      '<span style="color:#2F6B45">' + round1(picked.p*state.qty) + 'p</span>' +
      '<span style="color:#111">' + round1(picked.c*state.qty) + 'cal</span>' +
      '<span style="color:#B5651D">' + round1(picked.cb*state.qty) + 'c</span>' +
      '<span style="color:#9C2B1B">' + round1(picked.f*state.qty) + 'f</span>' +
      '</div>';

    html += '<div class="preview-box"><div class="ttl">' + (state.view==='plan' ? "Day\'s plan would become" : 'Day would become') + '</div>';
    html += '<div class="row"><span class="l">Calories</span><span class="v">' + Math.round(projected.c) + (calorieGoal>0 ? '<span class="g"> /' + calorieGoal + '</span>' : '') + '</span></div>';
    html += '<div class="row"><span class="l">Protein</span><span class="v">' + round1(projected.p) + 'g' + (proteinGoal>0 ? '<span class="g"> /' + proteinGoal + 'g</span>' : '') + '</span></div>';
    if (proteinGoal > 0) {
      var hit2 = projected.p >= proteinGoal;
      html += '<div class="note" style="color:' + (hit2?'#2F6B45':'#7a5a1e') + '">' + (hit2 ? ('\u2713 hits your protein goal, +' + round1(projected.p - proteinGoal) + 'g over') : ('still ' + round1(proteinGoal - projected.p) + 'g short of your goal')) + '</div>';
    }
    html += '<div class="sub-row"><span>' + round1(projected.cb) + 'g carbs</span><span>' + round1(projected.f) + 'g fat</span></div>';
    html += '</div>';

    html += '<button class="big-btn" data-action="confirmAdd">Add to ' + (state.view==='plan'?'Plan':'Log') + '</button>';
    html += '</div>';
  }

  // check if there's a plan for this date with items not already in the log (Log view only)
  var planForDate = state.view === 'log' ? lsGet('plan:' + date, []) : [];
  var logIds = {};
  entries.forEach(function(e){ logIds[String(e.id)] = true; });
  var unpulledPlanItems = planForDate.filter(function(e){
    return !logIds['pa-' + date + '-' + e.id] && !logIds[String(e.id)];
  });
  var hasPlan = unpulledPlanItems.length > 0;

  html += '<div class="entries-hdr"><span class="lbl">' + (state.view==='plan'?'Planned':'Logged') + ' (' + entries.length + ')</span>' +

      ? '<button class="copy-day-btn" data-action="openCopyDay">Copy day</button><button class="clear-day-btn" data-action="clearDay">Clear day</button>'

    '</span></div>';

  if (hasPlan) {
    html += '<button class="pull-plan-btn" data-action="pullFromPlan">' +

  if (state.showCopyDayPanel) {
    var cd = state.copyDayTarget;
    html += '<div class="copy-day-panel">';
    html += '<div class="ttl">Copy ' + entries.length + ' item(s) from ' + prettyDate(date) + ' to:</div>';
    html += '<div class="row">';
    html += '<input id="copy-day-date" type="date" data-field="copyDayTarget.date" value="' + esc(cd.date) + '">';
    html += '<select id="copy-day-view" data-field="copyDayTarget.view">' +
      '<option value="log"' + (cd.view==='log'?' selected':'') + '>Log</option>' +

    html += '</div>';
    html += '<div class="btn-row"><button class="cancel-btn" data-action="cancelCopyDay">Cancel</button><button class="save-btn" data-action="performCopyDay">Copy</button></div>';
    html += '</div>';
  }

  if (entries.length === 0) {
    html += '<div class="empty-state">' + (state.view==='plan' ? 'Nothing planned yet \u2014 search above to add what you\'ll eat.' : 'Nothing logged yet \u2014 search above to add a food.') + '</div>';
  } else {
    entries.forEach(function(e) {
      html += '<div class="entry"><div><div class="name">' + esc(e.n) + '</div><div class="meta">' + e.qty + UNIT_LABEL[e.u] + ' \u00b7 ' + round1(e.c*e.qty) + ' cal \u00b7 P' + round1(e.p*e.qty) + ' C' + round1(e.cb*e.qty) + ' F' + round1(e.f*e.qty) + '</div></div>' +
        '<div class="entry-actions">' +
          '<button data-action="duplicateEntry" data-id="' + e.id + '" aria-label="Repeat this">\uD83D\uDCCB</button>' +

  html += '<div class="sync-wrap">';
  html += '<button class="sync-toggle" data-action="toggleSync">' + (state.showSync ? '\u2212' : '+') + ' Sync &amp; Updates</button>';
  if (state.showSync) {
    html += '<div class="sync-panel">';
    html += '<div class="sync-note">This app keeps separate data in Safari vs. the Home Screen icon. Use Export/Import to carry your log between them or onto another device.</div>';
    html += '<div class="sync-row">';
    html += '<button class="sync-btn" data-action="exportData">Export My Data</button>';
    html += '<button class="sync-btn" data-action="showImport">Import Data</button>';
    html += '</div>';

      html += '<textarea id="import-box" data-field="importText" placeholder="Paste exported data here">' + esc(state.importText) + '</textarea>';

    }

      html += '<div class="sync-note">Copy this text (tap in the box, select all, copy), then paste it into Import on the other app.</div>';

    html += '</div>';

  html += '</div>';

  html += '</div>';

  root.innerHTML = html;

  // if user is mid-typing a qty (e.g. "4.") restore the raw display string
  // so the decimal point doesn't get replaced by the parsed number "4"
  if (_skipQtyInputReset) {
    var qtyEl = document.getElementById('qty-input');
    if (qtyEl) qtyEl.value = state.qtyRaw;
  }

  if (activeId) {
    var el = document.getElementById(activeId);
    if (el) {
      suppressNextFocusSelect = true; // this refocus is programmatic (re-render), not a real user tap
      el.focus();
      if (selStart != null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) {}
      }
    }
  }

  // always populate the search results container after a full render
  updateSearchResults();
}

// ---------------------------------------------------------------------------
// Actions
// ---------------------------------------------------------------------------
function findFood(id) {
  id = String(id);
  return allFoods().find(function(f){ return String(f.id) === id; });
}

function pickFood(food) {
  state.picked = food;
  state.qty = UNIT_DEFAULT[food.u] != null ? UNIT_DEFAULT[food.u] : 1; state.qtyRaw = String(state.qty);
  state.searchFocused = false;
  state.query = '';
}

function pickRecent(r) {
  state.picked = r;
  state.qty = r.qty; state.qtyRaw = String(r.qty); // re-use the exact amount logged last time
  state.searchFocused = false;
  state.query = '';
}

function confirmAdd() {
  if (!state.picked || !state.qty || state.qty <= 0) return;
  var p = state.picked;
  var entry = { id: Date.now() + Math.random(), n: p.n, u: p.u, p: p.p, c: p.c, cb: p.cb, f: p.f, qty: state.qty };
  var entries = getEntries();
  if (state.view === 'log') recordPair(entry, entries);
  entries.push(entry);
  setEntries(entries);

  // bump this food to the front of "recently logged", deduped by name+unit
  var filtered = state.recentFoods.filter(function(r){ return !(r.n === p.n && r.u === p.u); });
  var nextRecents = [{ id: 'recent-' + p.n + '-' + p.u, n: p.n, u: p.u, p: p.p, c: p.c, cb: p.cb, f: p.f, qty: state.qty }].concat(filtered).slice(0, 12);
  state.recentFoods = nextRecents;
  lsSet('recentFoods', nextRecents);

  state.picked = null;
  state.qty = 0; state.qtyRaw = '0';
  render();
}

function removeEntry(id) {
  var entries = getEntries().filter(function(e){ return String(e.id) !== String(id); });
  setEntries(entries);
  render();
}

function duplicateEntry(id) {
  var entries = getEntries();
  var original = entries.find(function(e){ return String(e.id) === String(id); });
  if (!original) return;
  var copy = Object.assign({}, original, { id: Date.now() + Math.random() });

  if (state.view === 'log') recordPair(copy, entries);
  entries.push(copy);
  setEntries(entries);

  // treat it like a fresh log too — bump to front of recents
  var filtered = state.recentFoods.filter(function(r){ return !(r.n === original.n && r.u === original.u); });
  var nextRecents = [{ id: 'recent-' + original.n + '-' + original.u, n: original.n, u: original.u, p: original.p, c: original.c, cb: original.cb, f: original.f, qty: original.qty }].concat(filtered).slice(0, 12);
  state.recentFoods = nextRecents;
  lsSet('recentFoods', nextRecents);

  showToast('Repeated "' + original.n + '"');
}

function clearDay() {
  var label = state.view === 'plan' ? 'plan' : 'log';
  var ok = window.confirm('Clear all ' + getEntries().length + ' item(s) from ' + label + ' for ' + prettyDate(currentDate()) + '? This can\'t be undone.');
  if (!ok) return;
  setEntries([]);
  render();
}

function openCopyDay() {
  state.copyDayTarget = { date: shiftDate(currentDate(), 1), view: state.view };
  state.showCopyDayPanel = true;
  render();
}

function cancelCopyDay() {
  state.showCopyDayPanel = false;
  render();
}

function performCopyDay() {
  var sourceEntries = getEntries();
  if (!sourceEntries.length) { state.showCopyDayPanel = false; render(); return; }
  var target = state.copyDayTarget;
  var targetKey = (target.view === 'log' ? 'log:' : 'plan:') + target.date;
  var existing = lsGet(targetKey, []);
  var copied = sourceEntries.map(function(e){ return Object.assign({}, e, { id: Date.now() + Math.random() }); });
  lsSet(targetKey, existing.concat(copied));
  state.showCopyDayPanel = false;
  showToast('Copied ' + copied.length + ' item(s) to ' + (target.view === 'plan' ? 'plan' : 'log') + ' for ' + prettyDate(target.date));
}

function toggleSync() {
  state.showSync = !state.showSync;
  state.exportText = null;
  state.importText = null;
  render();
}

function exportAllData() {
  var dump = {};
  for (var i = 0; i < localStorage.length; i++) {
    var key = localStorage.key(i);
    dump[key] = localStorage.getItem(key);
  }
  state.exportText = JSON.stringify(dump);
  state.importText = null;
  render();
}

function showImportBox() {
  state.importText = '';
  state.exportText = null;
  render();
}

function cancelImport() {
  state.importText = null;
  render();
}

function runImport() {
  var text = (state.importText || '').trim();
  if (!text) return;
  var parsed;
  try { parsed = JSON.parse(text); }
  catch (e) { showToast('That doesn\u2019t look like valid exported data \u2014 check you copied the whole thing'); return; }
  if (!parsed || typeof parsed !== 'object') { showToast('That doesn\u2019t look like valid exported data'); return; }
  var ok = window.confirm('Import this data? It will be merged into what\u2019s already on this device, overwriting any matching items (same food, same day).');
  if (!ok) return;
  Object.keys(parsed).forEach(function(key) {
    try { localStorage.setItem(key, parsed[key]); } catch (e) {}
  });
  // refresh in-memory state from the newly-imported storage
  state.customFoods = lsGet('customFoods', []);
  state.recentFoods = lsGet('recentFoods', []);
  state.foodEdits = lsGet('foodEdits', {});
  state.deletedFoodIds = lsGet('deletedFoodIds', []);
  state.pairCounts = lsGet('pairCounts', {});
  state.goals = lsGet('goals', { protein: '', calories: '' });
  state.importText = null;
  showToast('Import complete');
}

function checkForUpdates() {
  showToast('Checking for the latest version\u2026');
  fetch(location.href.split('#')[0].split('?')[0] + '?cb=' + Date.now(), { cache: 'no-store' })
    .then(function() {
      showToast('Reloading with the latest version\u2026');
      setTimeout(function() { location.reload(); }, 600);
    })
    .catch(function() {
      showToast('Could not check for updates \u2014 check your connection');
    });
}

function defineCustomFood() {
  var d = state.customDraft;
  var name = d.n.trim();
  if (!name) return;
  var amount = Number(d.amount) || 1;
  var unit = d.unit;
  var food = {
    id: 'custom-' + Date.now(),
    n: name, u: unit,
    p: (Number(d.p)||0) / amount, c: (Number(d.c)||0) / amount, cb: (Number(d.cb)||0) / amount, f: (Number(d.f)||0) / amount,
  };
  if (state.saveCustomForFuture) {
    var already = state.customFoods.some(function(cf){ return cf.n.toLowerCase() === name.toLowerCase(); });
    if (!already) {
      state.customFoods = state.customFoods.concat([food]);
      lsSet('customFoods', state.customFoods);
    }
  }
  state.customDraft = { n: '', amount: '', unit: 'g', p: '', c: '', cb: '', f: '' };
  state.showCustomForm = false;
  pickFood(food);
  state.qty = amount; state.qtyRaw = String(amount);
  render();
}

function startEditFood(id) {
  var food = isCustomId(id) ? state.customFoods.find(function(f){ return String(f.id) === String(id); }) : getFoodById(id);
  if (!food) return;
  state.editingFood = food;
  state.editDraft = { n: food.n, u: food.u, p: String(food.p), c: String(food.c), cb: String(food.cb), f: String(food.f) };
  state.confirmDeleteId = null;
  render();
}

function cancelEditFood() {
  state.editingFood = null;
  state.editDraft = null;
  render();
}

function saveEditFood() {
  if (!state.editingFood) return;
  var id = state.editingFood.id;
  var d = state.editDraft;
  var updated = {
    n: d.n.trim() || state.editingFood.n,
    u: d.u,
    p: Number(d.p) || 0,
    c: Number(d.c) || 0,
    cb: Number(d.cb) || 0,
    f: Number(d.f) || 0,
  };
  if (isCustomId(id)) {
    state.customFoods = state.customFoods.map(function(f) {
      return String(f.id) === String(id) ? Object.assign({}, f, updated) : f;
    });
    lsSet('customFoods', state.customFoods);
  } else {
    state.foodEdits[String(id)] = updated;
    lsSet('foodEdits', state.foodEdits);
  }
  state.editingFood = null;
  state.editDraft = null;
  render();
}

function startDeleteFood(id) {
  state.confirmDeleteId = id;
  render();
}

function cancelDeleteFood() {
  state.confirmDeleteId = null;
  render();
}

function confirmDeleteFood(id) {
  if (isCustomId(id)) {
    state.customFoods = state.customFoods.filter(function(f){ return String(f.id) !== String(id); });
    lsSet('customFoods', state.customFoods);
  } else {
    state.deletedFoodIds = state.deletedFoodIds.concat([id]);
    lsSet('deletedFoodIds', state.deletedFoodIds);
  }
  state.confirmDeleteId = null;
  render();
}

function pullFromPlan() {
  var date = currentDate();
  var planEntries = lsGet('plan:' + date, []);
  if (!planEntries.length) { showToast('No plan found for ' + prettyDate(date)); return; }

  var logEntries = getEntries();
  var existingIds = {};
  logEntries.forEach(function(e){ existingIds[String(e.id)] = true; });

  // only pull items not already in the log (check both original id and pa- prefixed id)
  var toAdd = planEntries
    .filter(function(e){
      return !existingIds['pa-' + date + '-' + e.id] && !existingIds[String(e.id)];
    })
    .map(function(e){
      return Object.assign({}, e, { id: 'pa-' + date + '-' + e.id });
    });

  if (!toAdd.length) { showToast('Everything from your plan is already in today\u2019s log'); return; }
  setEntries(logEntries.concat(toAdd));
  showToast('\u2713 Added ' + toAdd.length + ' item(s) from your ' + prettyDate(date) + ' plan');
  render();
}

function copyPlanToLog() {
  var planEntries = getEntries();
  var logEntries = lsGet('log:' + state.planDate, []);
  var copied = planEntries.map(function(e){ return Object.assign({}, e, { id: Date.now() + Math.random() }); });
  lsSet('log:' + state.planDate, logEntries.concat(copied));
  state.toast = 'Added to log for ' + prettyDate(state.planDate);
  render();
  setTimeout(function(){ state.toast = ''; render(); }, 2200);
}

function setPath(obj, path, value) {
  var parts = path.split('.');
  var o = obj;
  for (var i = 0; i < parts.length - 1; i++) o = o[parts[i]];
  o[parts[parts.length - 1]] = value;
}

// ---------------------------------------------------------------------------
// Event delegation — attached once
// ---------------------------------------------------------------------------
// Auto-select existing text when a field gets focus, so typing replaces it
// instead of appending to it — covers every text/number input, present and future.
// Skipped when the focus event is the app's own programmatic refocus after a
// re-render (e.g. after each keystroke), so typing multi-digit numbers works.
var suppressNextFocusSelect = false;
var _skipQtyInputReset = false; // set during qty typing to stop render() from overwriting "4." with "4"
var _blurTimer = null;

root.addEventListener('focusin', function(e) {
  if (e.target.id === 'search-input') {
    clearTimeout(_blurTimer);
    if (!state.searchFocused) {
      state.searchFocused = true;
      updateSearchResults();
    }
  }
  if (suppressNextFocusSelect) {
    suppressNextFocusSelect = false;
    return;
  }
  if (e.target.tagName === 'INPUT' && (e.target.type === 'number' || e.target.type === 'text')) {
    e.target.select();
  }
});

root.addEventListener('focusout', function(e) {
  if (e.target.id === 'search-input') {
    // small delay so tapping a result registers before the dropdown disappears
    _blurTimer = setTimeout(function() {
      state.searchFocused = false;
      updateSearchResults();
    }, 200);
  }
});

// Auto-advance between custom food form fields on Enter / "Next" key
var CUSTOM_FIELD_ORDER = ['custom-name','custom-amount','custom-cal','custom-protein','custom-carbs','custom-fat'];
root.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter' && e.key !== 'Next') return;
  var id = e.target.id;
  var idx = CUSTOM_FIELD_ORDER.indexOf(id);
  if (idx === -1) return;
  e.preventDefault();
  var nextId = CUSTOM_FIELD_ORDER[idx + 1];
  if (nextId) {
    var next = document.getElementById(nextId);
    if (next) { next.focus(); next.select(); }
  } else {
    // last field — blur to close keyboard
    e.target.blur();
  }
});

root.addEventListener('click', function(e) {
  var btn = e.target.closest('[data-action]');
  if (!btn) return;
  var action = btn.dataset.action;
  var value = btn.dataset.value;

  if (action === 'setView') { state.view = value; state.picked = null; state.qty = 0; state.qtyRaw = '0'; render(); }
  else if (action === 'shiftDate') {
    var delta = Number(value);
    if (state.view === 'log') state.logDate = shiftDate(state.logDate, delta);
    else state.planDate = shiftDate(state.planDate, delta);
    render();
  }
  else if (action === 'toggleGoals') { state.showGoals = !state.showGoals; render(); }
  else if (action === 'adjustBurned') {
    setBurned(Math.max(0, getBurned() + Number(value)));
    render();
  }
  else if (action === 'copyPlanToLog') { copyPlanToLog(); }
  else if (action === 'setMode') { state.mode = value; state.showCustomForm = false; if (value !== 'browse') state.browseQuery = ''; render(); }
  else if (action === 'toggleCustomForm') { state.showCustomForm = !state.showCustomForm; render(); }
  else if (action === 'clearQuery') {
    state.query = '';
    var si = document.getElementById('search-input');
    if (si) si.value = '';
    updateSearchResults();
  }
  else if (action === 'clearBrowseQuery') {
    state.browseQuery = '';
    render();
    var bs = document.getElementById('browse-search');
    if (bs) { bs.focus(); }
  }
  else if (action === 'pickFood') { var f = findFood(btn.dataset.id); if (f) { pickFood(f); render(); } }
  else if (action === 'pickFoodAndSearch') { var f2 = findFood(btn.dataset.id); if (f2) { pickFood(f2); state.mode = 'search'; render(); } }
  else if (action === 'pickRecent') {
    var id = btn.dataset.id;
    // check today's entries first (from the "Logged Today" chips)
    var todayEntries = getEntries();
    var fromToday = todayEntries.find(function(x){ return String(x.id) === id; });
    if (fromToday) { pickRecent(fromToday); render(); return; }
    // fall back to all-time recentFoods (from search dropdown fallback)
    var r = state.recentFoods.find(function(x){ return String(x.id) === id; });
    if (r) { pickRecent(r); render(); }
  }
  else if (action === 'closePicked') { state.picked = null; state.qty = 0; render(); }
  else if (action === 'adjustQty') { state.qty = Math.max(0, round1((state.qty||0) + Number(value))); state.qtyRaw = String(state.qty); render(); }
  else if (action === 'confirmAdd') { confirmAdd(); }
  else if (action === 'removeEntry') { removeEntry(btn.dataset.id); }
  else if (action === 'duplicateEntry') { duplicateEntry(btn.dataset.id); }
  else if (action === 'clearDay') { clearDay(); }
  else if (action === 'openCopyDay') { openCopyDay(); }
  else if (action === 'pullFromPlan') { pullFromPlan(); }
  else if (action === 'cancelCopyDay') { cancelCopyDay(); }
  else if (action === 'performCopyDay') { performCopyDay(); }
  else if (action === 'toggleSync') { toggleSync(); }
  else if (action === 'exportData') { exportAllData(); }
  else if (action === 'showImport') { showImportBox(); }
  else if (action === 'cancelImport') { cancelImport(); }
  else if (action === 'runImport') { runImport(); }
  else if (action === 'checkForUpdates') { checkForUpdates(); }
  else if (action === 'defineCustomFood') { defineCustomFood(); }
  else if (action === 'toggleCat') {
    var cat = btn.dataset.cat;
    state.openCats[cat] = !state.openCats[cat];
    render();
  }
  else if (action === 'scanBarcode') { scanAndLookup(); }
  else if (action === 'editFood') { startEditFood(btn.dataset.id); }
  else if (action === 'cancelEditFood') { cancelEditFood(); }
  else if (action === 'saveEditFood') { saveEditFood(); }
  else if (action === 'deleteFood') { startDeleteFood(btn.dataset.id); }
  else if (action === 'cancelDeleteFood') { cancelDeleteFood(); }
  else if (action === 'confirmDeleteFood') { confirmDeleteFood(btn.dataset.id); }
});

root.addEventListener('input', function(e) {
  var field = e.target.dataset.field;
  if (!field) return;
  var val = e.target.value;
  if (field === 'query') { state.query = val; updateSearchResults(); }
  else if (field === 'browseQuery') { state.browseQuery = val; render(); }
  else if (field === 'qty') {
    // strip any spaces iOS inserts after the decimal point
    var cleaned = val.replace(/\s/g, '');
    // update the DOM directly if we stripped a space, so cursor stays correct
    if (cleaned !== val) {
      var qEl = document.getElementById('qty-input');
      if (qEl) qEl.value = cleaned;
    }
    // keep raw string so "4." doesn't collapse to "4" during re-render
    state.qtyRaw = cleaned;
    state.qty = cleaned === '' || cleaned === '.' || cleaned === '0.' ? 0 : Number(cleaned);
    // only re-render the preview/stats — but skip resetting the input value
    // by marking a flag the render loop checks
    _skipQtyInputReset = true;
    render();
    _skipQtyInputReset = false;
  }
  else if (field === 'burned') { setBurned(Math.max(0, Number(val) || 0)); render(); }
  else if (field === 'goals.protein' || field === 'goals.calories') {
    setPath(state, field, val);
    lsSet('goals', state.goals);
    render();
  }
  else if (field.indexOf('customDraft.') === 0) {
    // strip iOS spaces on numeric sub-fields
    var isNumField = ['customDraft.amount','customDraft.c','customDraft.p','customDraft.cb','customDraft.f'].indexOf(field) !== -1;
    var cleanedVal = isNumField ? val.replace(/\s/g, '') : val;
    setPath(state, field, cleanedVal);
    // only patch the DOM minimally — no full rebuild so the keyboard stays attached
    if (isNumField && cleanedVal !== val) {
      var fEl = document.getElementById(e.target.id);
      if (fEl) fEl.value = cleanedVal;
    }
    // the only reactive element is the submit button's disabled state (depends on name being filled)
    var submitBtn = document.querySelector('[data-action="defineCustomFood"]');
    if (submitBtn) submitBtn.disabled = !state.customDraft.n.trim();
  }
  else if (field.indexOf('editDraft.') === 0) {
    var isNumEditField = ['editDraft.c','editDraft.p','editDraft.cb','editDraft.f'].indexOf(field) !== -1;
    var cleanedEdit = isNumEditField ? val.replace(/\s/g, '') : val;
    setPath(state, field, cleanedEdit);
    // strip space in DOM if needed, no full rebuild
    if (isNumEditField && cleanedEdit !== val) {
      var eEl = document.getElementById(e.target.id);
      if (eEl) eEl.value = cleanedEdit;
    }
    // nothing else in the edit panel depends reactively on the current draft values while typing
  }
  else if (field === 'copyDayTarget.date') {
    state.copyDayTarget.date = val;
    render();
  }
  else if (field === 'importText') {
    state.importText = val;
    render();
  }
});

root.addEventListener('change', function(e) {
  var field = e.target.dataset.field;
  if (!field) return;
  if (field === 'saveCustomForFuture') { state.saveCustomForFuture = e.target.checked; render(); }
  else if (field === 'customDraft.unit') { state.customDraft.unit = e.target.value; render(); }
  else if (field === 'editDraft.u') { state.editDraft.u = e.target.value; render(); }
  else if (field === 'copyDayTarget.view') { state.copyDayTarget.view = e.target.value; render(); }
});

// ---------------------------------------------------------------------------
// Barcode scanning — lazy-loads ZXing from a CDN only when you tap "Scan"
// (so the rest of the app keeps working offline). Needs HTTPS + camera
// permission, so this only works once the app is hosted (e.g. GitHub Pages),
// not from a local file.
// ---------------------------------------------------------------------------
var _zxingPromise = null;
function loadZXing() {
  if (window.ZXing) return Promise.resolve(window.ZXing);
  if (_zxingPromise) return _zxingPromise;
  _zxingPromise = new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = 'https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js';
    s.onload = function() { resolve(window.ZXing); };
    s.onerror = function() { reject(new Error('Could not load the barcode scanner (check your internet connection)')); };
    document.head.appendChild(s);
  });
  return _zxingPromise;
}

function openScanner(onResult) {
  if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
    state.toast = 'Barcode scanning needs the app to be hosted over https:// (e.g. GitHub Pages) — it won\u2019t work from a local file.';
    render();
    setTimeout(function(){ state.toast=''; render(); }, 4000);
    return;
  }

  var overlay = document.createElement('div');
  overlay.id = 'scanner-overlay';
  overlay.innerHTML =
    '<div class="scanner-box">' +
      '<video id="scanner-video" autoplay playsinline muted></video>' +
      '<div class="scanner-frame"></div>' +
      '<div class="scanner-status" id="scanner-status">Loading scanner\u2026</div>' +
      '<button id="scanner-cancel">Cancel</button>' +
    '</div>';
  document.body.appendChild(overlay);

  var statusEl = overlay.querySelector('#scanner-status');
  var codeReader = null;
  var stopped = false;

  function cleanup() {
    if (stopped) return;
    stopped = true;
    try { if (codeReader) codeReader.reset(); } catch (e) {}
    if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }
  overlay.querySelector('#scanner-cancel').addEventListener('click', cleanup);

  loadZXing().then(function(ZXing) {
    if (stopped) return;
    statusEl.textContent = 'Point your camera at the barcode';
    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromConstraints(
      { video: { facingMode: 'environment' } },
      'scanner-video',
      function(result, err) {
        if (stopped || !result) return;
        var code = result.getText();
        cleanup();
        onResult(code);
      }
    ).catch(function(err) {
      if (!stopped) statusEl.textContent = 'Camera error: ' + (err && err.message ? err.message : 'could not access the camera');
    });
  }).catch(function(err) {
    if (!stopped) statusEl.textContent = err.message;
  });
}

function showToast(msg, ms) {
  state.toast = msg;
  render();
  setTimeout(function(){ if (state.toast === msg) { state.toast = ''; render(); } }, ms || 2500);
}

function lookupBarcode(code) {
  state.showCustomForm = true;
  state.customDraft = { n: 'Looking up ' + code + '\u2026', amount: '100', unit: 'g', p: '', c: '', cb: '', f: '' };
  render();

  fetch('https://world.openfoodfacts.org/api/v2/product/' + encodeURIComponent(code) + '.json?fields=product_name,brands,nutriments,serving_size')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data || data.status === 0 || !data.product) {
        state.customDraft = { n: '', amount: '100', unit: 'g', p: '', c: '', cb: '', f: '' };
        render();
        showToast('No product found for ' + code + ' — try manual entry');
        return;
      }
      var prod = data.product;
      var n = prod.nutriments || {};
      var name = prod.product_name || ('Item ' + code);
      if (prod.brands) name = prod.brands.split(',')[0].trim() + ' ' + name;
      var cal = n['energy-kcal_100g'];
      var protein = n['proteins_100g'];
      var carbs = n['carbohydrates_100g'];
      var fat = n['fat_100g'];
      state.customDraft = {
        n: name.trim(),
        amount: '100',
        unit: 'g',
        c: cal != null ? String(Math.round(cal)) : '',
        p: protein != null ? String(protein) : '',
        cb: carbs != null ? String(carbs) : '',
        f: fat != null ? String(fat) : '',
      };
      render();
      if (cal == null && protein == null) {
        showToast('Found "' + name.trim() + '" but nutrition data was incomplete — fill in what\u2019s missing');
      }
    })
    .catch(function() {
      state.customDraft = { n: '', amount: '100', unit: 'g', p: '', c: '', cb: '', f: '' };
      render();
      showToast('Could not reach the food database — check your connection');
    });
}

function scanAndLookup() {
  openScanner(function(code) {
    lookupBarcode(code);
  });
}

render();
</script>
